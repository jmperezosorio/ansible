---
- name: Bootstrap Python compatible para Linux
  hosts: os_linux
  become: yes
  gather_facts: no

  tasks:
    - name: Instalar Python 3.9 en servidores RHEL/CentOS/Rocky/Alma
      ansible.builtin.raw: |
        if ! command -v python3.9 >/dev/null 2>&1; then
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y python39 python39-pip
          elif command -v yum >/dev/null 2>&1; then
            yum install -y python39 python39-pip
          fi
        fi
      changed_when: false

    - name: Validar Python instalado
      ansible.builtin.raw: |
        python3.9 --version
      changed_when: false


- name: Validaciones y actualización base Linux
  hosts: os_linux
  become: yes
  gather_facts: yes

  vars:
    ansible_python_interpreter: /usr/bin/python3.9
    usuario_ansible: ansible
    espacio_minimo_disponible_pct: 20

    servicios_criticos:
      - sshd
      - crond

  tasks:
    - name: Validar espacio disponible en disco
      ansible.builtin.assert:
        that:
          - item.size_available > (item.size_total * espacio_minimo_disponible_pct / 100)
        fail_msg: "El filesystem {{ item.mount }} tiene menos del {{ espacio_minimo_disponible_pct }}% libre"
        success_msg: "El filesystem {{ item.mount }} tiene espacio suficiente"
      loop: "{{ ansible_mounts }}"

    - name: Obtener información de servicios
      ansible.builtin.service_facts:

    - name: Validar servicios críticos
      ansible.builtin.assert:
        that:
          - ansible_facts.services[item + '.service'] is defined
          - ansible_facts.services[item + '.service'].state == 'running'
        fail_msg: "El servicio {{ item }} no está corriendo"
        success_msg: "El servicio {{ item }} está activo"
      loop: "{{ servicios_criticos }}"

    - name: Crear usuario ansible
      ansible.builtin.user:
        name: "{{ usuario_ansible }}"
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Configurar sudo sin password
      ansible.builtin.copy:
        dest: /etc/sudoers.d/ansible
        content: "{{ usuario_ansible }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: '0440'
        validate: /usr/sbin/visudo -cf %s

    - name: Actualizar sistema operativo RHEL/CentOS/Rocky/Alma
      ansible.builtin.raw: |
        dnf update -y || yum update -y
      changed_when: true
      when: ansible_os_family == "RedHat"

    - name: Actualizar sistema operativo Debian/Ubuntu
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
      when: ansible_os_family == "Debian"

    - name: Reiniciar servidor si es requerido
      ansible.builtin.reboot:
        reboot_timeout: 1800
